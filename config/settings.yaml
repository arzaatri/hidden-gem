# Non-secret, tunable configuration. Secrets (credentials) live in .env instead.

etl:
  # Cap on games pulled per run. Keep small for local dev/testing; raise for a real run.
  max_games: 1000
  # A game is flagged as a "hidden gem" in the gold layer when its aggregated
  # rating count falls below this percentile of all games' rating counts.
  # Recomputed from the full dataset on every gold rebuild (dim_games is
  # fully rebuilt each run), so it tracks the dataset's size/shape over time
  # instead of drifting out of date like a fixed count would.
  hidden_gem_rating_count_percentile: 10
  # Daily refresh schedule (cron), used by the Dagster schedule.
  schedule_cron: "0 6 * * *"

recommendation:
  # Number of hidden gems GemFinder returns per request.
  hidden_gem_count: 2
  # Max games a user can select as input to "Mine for gems".
  max_selected_games: 5
  # Hard quality filter on aggregated_rating (critic score). Games below this
  # are never recommended; null ratings pass (no critic reviews isn't the
  # same as being panned).
  rating_cutoff: 65
  # Flat weights for ContentBasedGemFinder's 7 similarity signals — must sum
  # to 1. Missing signals (e.g. no storyline) renormalize across whatever's
  # available for that pair, rather than scoring the missing one as 0.
  weights:
    genre: 0.10
    theme: 0.15
    keyword: 0.25
    summary: 0.20
    storyline: 0.10
    cover: 0.10
    screenshots: 0.10

minio:
  endpoint: "minio:9000" # host:port, no scheme — resolved inside the docker network
  bucket: "hidden-game"
  bronze_prefix: "bronze"
  silver_prefix: "silver"
  use_ssl: false

postgres:
  host: "postgres"
  port: 5432
  gold_schema: "gold"
  etl_state_schema: "etl_state"
  dagster_schema: "dagster"

igdb:
  api_base_url: "https://api.igdb.com/v4"
  auth_url: "https://id.twitch.tv/oauth2/token"
  # Field list requested from the /games endpoint (Apicalypse).
  fields:
    - name
    - rating
    - aggregated_rating
    - aggregated_rating_count
    - follows
    - hypes
    - genres.name
    - themes.name
    - keywords.name
    - summary
    - storyline
    - screenshots.url
    - cover.image_id
    - first_release_date
    - updated_at
  page_size: 500 # IGDB max per request
  requests_per_second: 4 # IGDB rate limit
