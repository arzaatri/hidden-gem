services:
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: pgvector/pgvector:0.8.5-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  dagster:
    build:
      context: .
      dockerfile: docker/dagster.Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DAGSTER_PG_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?options=-csearch_path%3Ddagster"
    depends_on:
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./orchestration:/app/orchestration
      - ./extraction:/app/extraction
      - ./embeddings:/app/embeddings
      - ./quality:/app/quality
      - ./config:/app/config
      - ./dbt_project:/app/dbt_project
      - ./logs:/app/logs

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./config:/app/config
      - ./logs:/app/logs

volumes:
  minio_data:
  postgres_data:
