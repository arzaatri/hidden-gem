<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Hidden Gem</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main>
    <h1>Hidden Gem</h1>
    <p class="subtitle">Pick up to 5 games you like, then mine for hidden gems.</p>

    <div class="search-box">
      <input id="search-input" type="text" placeholder="Search for a game..." autocomplete="off" />
      <ul id="suggestions" class="suggestions hidden"></ul>
    </div>

    <ul id="selected-games" class="chip-list"></ul>

    <label class="toggle">
      <input id="hidden-gems-only" type="checkbox" checked />
      Hidden gems only
    </label>

    <button id="mine-button" disabled>Mine for gems</button>

    <section id="results"></section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
