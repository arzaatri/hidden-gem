name: "hidden_gem"
version: "1.0.0"
profile: "hidden_gem"

model-paths: ["models"]
target-path: "target"
clean-targets: ["target"]

vars:
  # Default percentile for the gold `hidden_gem` flag (games below this
  # percentile of aggregated_rating_count are "hidden gems"). The Dagster
  # pipeline overrides this from config/settings.yaml at runtime so there's
  # one source of truth; this default just lets `dbt build` work standalone.
  hidden_gem_rating_count_percentile: 10

models:
  hidden_gem:
    staging:
      +materialized: view
    silver:
      +materialized: external
    gold:
      +materialized: table
